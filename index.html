<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width= , initial-scale=1.0">
    <title>Social links profile</title>
    <!-- css link -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <main class="container">
        <article class="card">
            <header class="logo">
                <img src="assets/images/avatar-jessica.jpeg" alt="Jessica Randall's profile photo">
            </header>
            <div class="info">
                <h1>Jessica Randall</h1>
                <p class="location">London, United Kingdom</p>
                <p class="bio">"Front-end developer and avid reader"</p>
            </div>
            <nav class="social-links" aria-label="Social media links">
                <a href="#" aria-label="GitHub profile">Github</a>
                <a href="#" aria-label="Frontend Mentor profile">Frontend Mentor</a>
                <a href="#" aria-label="LinkedIn profile">LinkedIn</a>
                <a href="#" aria-label="Twitter profile">Twitter</a>
                <a href="#" aria-label="Instagram profile">Instagram</a>
            </nav>
        </article>
    </main>
</body>

</html>
